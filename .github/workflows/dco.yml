name: DCO

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: read
  contents: read

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        uses: dco-org/dco-action@v1
